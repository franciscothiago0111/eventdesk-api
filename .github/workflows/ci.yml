name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eventdesk
          POSTGRES_PASSWORD: eventdesk
          POSTGRES_DB: eventdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventdesk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://eventdesk:eventdesk@localhost:5432/eventdesk?schema=public
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 1d

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: yarn test

      - name: Integration tests
        run: yarn test:integration

      - name: e2e tests
        run: yarn test:e2e
